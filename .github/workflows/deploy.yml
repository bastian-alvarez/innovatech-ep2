name: CI/CD Pipeline Innovatech

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest ./front_despacho
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

      - name: Build y Push Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-backend-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-backend-ventas:latest

      - name: Build y Push Backend Despachos
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-backend-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-backend-despachos:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Conectar a EC2 y Desplegar
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
script: |
            mkdir -p ~/proyecto-innovatech
            cd ~/proyecto-innovatech
            
            # 1. Descargamos el archivo limpio desde GitHub
            curl -L https://raw.githubusercontent.com/${{ github.repository }}/deploy/docker-compose.yml -o docker-compose.yml
            
            # 2. Forzamos a que use las imágenes de Docker Hub y no intente construir
            # (Esto sobreescribe cualquier instrucción 'build' que se haya colado)
            sudo docker-compose down
            sudo docker-compose pull
            sudo docker-compose up -d
            
            # 3. Limpieza de imágenes huérfanas para ahorrar espacio
            sudo docker image prune -f